# ---------------------------------------------------------------------------
# CMS deployment configuration (INI variant)
#
# Copy to config.ini (project root) or point CMS_CONFIG_FILE at another path.
# Precedence: environment variable / .env  >  this file  >  code default.
# Sections are only for readability — keys are matched by name, so every key
# here can equally be set as an environment variable of the same (upper-case)
# name, e.g. [database] db_engine == DB_ENGINE.
#
# Runtime behaviour (page size, loan period, registration approval, …) is NOT
# configured here — those live in the database and are edited by staff users
# under "Einstellungen" in the web UI (defaults may be pre-seeded below in
# [app-defaults]).
# ---------------------------------------------------------------------------

[django]
# Generate your own for production, e.g.:
#   python -c "import secrets; print(secrets.token_urlsafe(50))"
;secret_key = change-me
;debug = false
;allowed_hosts = cms.example.com
# Needed when serving HTTPS behind a reverse proxy:
;csrf_trusted_origins = https://cms.example.com
;use_proxy_ssl_header = true

[database]
# sqlite (default) or postgres
;db_engine = postgres
;db_name = cms
;db_user = cms
;db_password = secret
;db_host = localhost
;db_port = 5432

[email]
;email_backend = django.core.mail.backends.smtp.EmailBackend
;email_host = smtp.example.com
;email_port = 587
;email_host_user = cms@example.com
;email_host_password = secret
;email_use_tls = true
;default_from_email = cms@example.com

[static]
# Enable hashed/compressed assets after `collectstatic` in production.
;static_manifest = true

[logging]
# One rotating log file per day in log_dir (rotates at midnight; today's file
# is cms.log, older ones cms.log.YYYY-MM-DD). Covers all components incl. 500
# tracebacks (django.request) and the app audit trail.
;log_dir = /var/log/cms
;log_level = INFO
;log_retention_days = 30

[security]
;secure_ssl_redirect = true
;session_cookie_secure = true
;csrf_cookie_secure = true
;secure_hsts_seconds = 31536000
;secure_hsts_include_subdomains = true
;secure_hsts_preload = true

[app-defaults]
# Fallback defaults for the database-backed runtime settings (see
# Collection_Management_System/runtime_settings.py). A value saved by a staff
# user in the web UI always wins over these.
;maintenance_mode = false
;api_enabled = false
;items_per_page = 50
;loan_overdue_days = 30
;loan_reminders_enabled = false
;loan_reminder_interval_days = 7
;trash_retention_days = 30
;registration_enabled = true
;registration_auto_approve = false
;notify_admins_on_registration = false
# Site-wide banner (empty = hidden); style: info | warning | danger | success
;announcement_text =
;announcement_style = warning
;default_currency = EUR
;lookup_timeout = 8
;global_search_max_items = 50
;upload_max_mb = 20
# Comma-separated, empty = all extensions allowed:
;upload_allowed_extensions = pdf, jpg, jpeg, png
