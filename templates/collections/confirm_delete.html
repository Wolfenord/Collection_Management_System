{% extends 'base.html' %}
{% load i18n %}
{% block title %}{% trans "Löschen bestätigen" %} · CMS{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger shadow-sm"><div class="card-body p-4">
            <h1 class="h4 mb-3">{% blocktrans with label=object_label %}{{ label }} löschen?{% endblocktrans %}</h1>
            <div class="alert alert-warning">{{ warning }}</div>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger">{% trans "Endgültig löschen" %}</button>
                    <a href="{% url 'collection_detail' collection.pk %}" class="btn btn-outline-secondary">{% trans "Abbrechen" %}</a>
                </div>
            </form>
        </div></div>
    </div>
</div>
{% endblock %}
