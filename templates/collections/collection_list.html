{% extends 'base.html' %}
{% load i18n %}
{% block title %}{% trans "Sammlungen" %} · CMS{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <h1 class="h3 mb-0">{% trans "Sammlungen" %}</h1>
    <div class="d-flex gap-2">
        <a href="{% url 'collection_restore' %}" class="btn btn-outline-secondary"
           title="{% trans 'Eine Sammlung aus einer ZIP-Sicherung wiederherstellen' %}">
            <i class="bi bi-file-zip"></i> {% trans "Wiederherstellen" %}
        </a>
        <a href="{% url 'collection_create' %}" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> {% trans "Neue Sammlung" %}
        </a>
    </div>
</div>
{% include 'collections/_collection_grid.html' %}
{% endblock %}
