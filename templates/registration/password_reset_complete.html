{% extends 'base.html' %}
{% load i18n %}
{% block title %}{% trans "Passwort geändert" %} · CMS{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4 text-center">
                <i class="bi bi-check-circle display-5 text-success d-block mb-2"></i>
                <h1 class="h4 mb-3">{% trans "Passwort geändert" %}</h1>
                <p class="text-muted">{% trans "Dein neues Passwort ist gespeichert. Du kannst dich jetzt damit anmelden." %}</p>
                <a href="{% url 'login' %}" class="btn btn-primary">{% trans "Zur Anmeldung" %}</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
